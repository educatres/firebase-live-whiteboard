<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>展示畫面｜ClassPad</title>
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body class="display-page">
    <main class="display-shell">
      <div id="displayBlack" class="display-black">
        <time id="displayClock" class="display-clock" aria-label="現在時間"></time>
        <span id="displayMessage" aria-live="polite" hidden></span>
      </div>
      <div id="displayStage" class="board-stage display-stage" hidden>
        <canvas id="displayBackground"></canvas>
        <div id="displayBackgroundLayer" class="background-image-layer"><img id="displayBackgroundImage" class="board-background-image" alt="題目底圖" hidden /></div>
        <canvas id="displayStudent" class="readonly-layer"></canvas>
        <canvas id="displayTeacher" class="readonly-layer"></canvas>
        <div id="displayStickyLayer" class="sticky-layer" aria-label="老師便條貼"></div>
        <div id="displayLabel" class="display-label"></div>
      </div>
    </main>
    <div id="toast" class="toast" role="status"></div>
    <script type="module" src="./src/pages/display.js"></script>
  </body>
</html>
