<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"
    />
    <title>多格監看｜ClassPad</title>
    <link rel="stylesheet" href="./src/styles/app.css" />
  </head>
  <body class="monitor-page">
    <header id="monitorToolbar" class="monitor-toolbar">
      <a class="brand" href="./" aria-label="返回 ClassPad 首頁">ClassPad</a>
      <div class="monitor-title" title="目前課程">
        <span class="eyebrow">即時監看</span>
        <strong id="classTitle">正在載入…</strong>
      </div>
      <div class="monitor-filters">
        <div class="grid-size-controls" role="group" aria-label="每頁顯示人數">
          <button type="button" data-grid-size="4" aria-pressed="true">4 格</button>
          <button type="button" data-grid-size="6" aria-pressed="false">6 格</button>
          <button type="button" data-grid-size="8" aria-pressed="false">8 格</button>
          <button type="button" data-grid-size="12" aria-pressed="false">12 格</button>
        </div>
        <input
          id="searchInput"
          type="search"
          placeholder="搜尋座號或姓名"
          aria-label="搜尋學生"
        />
        <label><input id="onlineOnly" type="checkbox" /> 僅在線</label>
        <label><input id="answeredOnly" type="checkbox" /> 僅有作答</label>
        <label><input id="autoRotate" type="checkbox" /> 自動輪播</label>
      </div>
      <nav class="monitor-actions" aria-label="監看工具">
        <a id="teacherLink" class="button-link" href="#">課堂設定</a>
        <button id="stopProjection" class="danger-outline" type="button" disabled>解除投影</button>
        <span id="connectionBadge" class="badge">連線中</span>
        <button
          id="hideMonitorToolbar"
          class="ghost toolbar-toggle"
          type="button"
          aria-controls="monitorToolbar"
          aria-label="隱藏上方工具列"
          title="隱藏上方工具列"
        >
          ↑ 隱藏
        </button>
      </nav>
    </header>
    <button
      id="showMonitorToolbar"
      class="monitor-toolbar-show"
      type="button"
      aria-controls="monitorToolbar"
      aria-label="顯示上方工具列"
      title="顯示上方工具列"
      hidden
    >
      ↓ 顯示工具列
    </button>
    <main class="monitor-main">
      <div id="monitorState" class="notice">正在載入學生…</div>
      <div id="monitorGrid" class="monitor-grid" data-size="4" hidden></div>
      <div class="pagination">
        <button id="prevPage" class="ghost">上一頁</button>
        <span id="pageLabel">第 1 / 1 頁</span>
        <button id="nextPage" class="ghost">下一頁</button>
      </div>
    </main>
    <dialog id="reviewDialog" class="review-dialog">
      <div class="review-head">
        <div>
          <strong id="reviewName"></strong>
          <span id="reviewPresence" class="badge"></span>
        </div>
        <nav class="review-page-controls" aria-label="學生白板頁面">
          <button id="reviewPrevPage" class="ghost" type="button">上一頁</button>
          <strong id="reviewPageLabel">第 1 / 1 頁</strong>
          <button id="reviewNextPage" class="ghost" type="button">下一頁</button>
          <select id="insertPagePosition" aria-label="空白頁插入位置"></select>
          <button id="insertBlankPage" class="primary" type="button">插入空白頁</button>
        </nav>
        <button id="closeReview" class="ghost">返回多格</button>
      </div>
      <div class="review-body">
        <div id="reviewStage" class="board-stage">
          <canvas id="reviewBackground"></canvas>
          <div id="reviewBackgroundLayer" class="background-image-layer"><img id="reviewBackgroundImage" class="board-background-image" alt="老師分享的題目底圖" hidden /></div>
          <canvas id="reviewStudent"></canvas>
          <canvas id="reviewTeacher"></canvas>
          <div id="reviewStickyLayer" class="sticky-layer" aria-label="便條貼圖層"></div>
        </div>
      </div>
      <div class="board-toolbar review-toolbar">
        <button data-tool="pen" class="active">✎<span>批注筆</span></button>
        <button data-tool="eraser">⌫<span>橡皮擦</span></button>
        <input id="reviewColor" type="color" value="#ef4444" aria-label="批注顏色" />
        <label class="brush-size-tool"
          >筆刷
          <select id="reviewWidth" aria-label="批注粗細">
            <option value="1">極細</option>
            <option value="3">細</option>
            <option value="5" selected>中</option>
            <option value="8">粗</option>
            <option value="12">很粗</option>
            <option value="20">特粗</option>
            <option value="30">30 px</option>
            <option value="40">40 px</option>
          </select>
        </label>
        <label class="background-url-tool"
          >Drive 底圖（需開放連結檢視）
          <input id="backgroundUrl" type="url" inputmode="url" placeholder="貼上 Google Drive 圖片分享網址" aria-label="Google Drive 圖片分享網址" title="請先將 Google Drive 圖片設為知道連結的使用者可檢視" />
        </label>
        <label class="background-scale-tool"
          >底圖大小
          <input id="backgroundScale" type="range" min="10" max="150" step="5" value="100" aria-label="底圖大小" />
          <output id="backgroundScaleLabel" for="backgroundScale">100%</output>
        </label>
        <button id="saveBackgroundImage" type="button">套用底圖</button>
        <button id="moveBackgroundImage" type="button" aria-pressed="false" disabled>移動底圖</button>
        <button id="removeBackgroundImage" type="button">移除底圖</button>
        <button id="projectReview" type="button">投影最近書寫頁</button>
        <button id="stopReviewProjection" class="danger-outline" type="button" disabled>解除投影</button>
        <button
          id="toggleSmoothing"
          class="active"
          type="button"
          aria-pressed="true"
          aria-label="關閉手寫平滑"
        >
          <span>平滑：開</span>
        </button>
        <label class="note-color-tool"
          >便條顏色
          <select id="stickyColor" aria-label="新增便條貼顏色">
            <option value="yellow">淡黃</option>
            <option value="blue">淡藍</option>
            <option value="pink">粉紅</option>
            <option value="green">淡綠</option>
          </select>
        </label>
        <button id="addStickyNote" type="button">+便條</button>
        <button id="reviewUndo">復原</button>
        <button id="reviewRedo">重做</button>
        <button id="toggleLock">鎖定白板</button>
        <button id="clearTeacher">清除批注</button>
        <button id="exportPng">下載 PNG</button>
        <button id="reviewResetZoom">100%</button>
      </div>
    </dialog>
    <div id="toast" class="toast" role="status"></div>
    <script type="module" src="./src/pages/monitor.js"></script>
  </body>
</html>
