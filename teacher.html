<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>課堂設定｜ClassPad</title><link rel="stylesheet" href="./src/styles/app.css"></head><body>
<header class="site-header"><a class="brand" href="./">ClassPad</a><nav><a id="monitorLink" class="button-link" href="#">多格監看</a><span id="connectionBadge" class="badge">連線中</span></nav></header>
<main class="container"><div id="pageState" class="notice">正在載入課堂…</div><section id="teacherContent" hidden>
<div class="page-heading"><div><p class="eyebrow">老師控制台</p><h1 id="classTitle"></h1><p id="classMeta" class="muted"></p></div><div class="button-row"><button id="shareMonitorBtn" class="primary">跨裝置監看</button><button id="resetMonitorDevicesBtn" class="danger-outline" disabled>解除其他監看裝置 (0)</button><button id="downloadCsvBtn" class="ghost">下載連結 CSV</button><button id="closeClassBtn" class="danger-outline">結束課堂</button><button id="deleteClassBtn" class="danger">刪除課堂</button></div></div>
<section class="panel"><h2>課堂設定</h2><form id="settingsForm" class="settings-grid"><label>課堂名稱<input name="title" maxlength="100" required></label><label>班級名稱<input name="className" maxlength="100"></label><label>活動名稱<input name="activityName" maxlength="100"></label><label class="switch"><input name="allowStudentWriting" type="checkbox"><span>允許學生書寫</span></label><label class="switch"><input name="allowStudentClear" type="checkbox"><span>允許學生清除</span></label><label class="switch"><input name="showTeacherAnnotations" type="checkbox"><span>顯示老師批注</span></label><button class="primary">儲存設定</button></form></section>
<section class="panel"><div class="section-title"><div><h2>匯入學生</h2><p class="muted">每行輸入「座號 姓名」或只輸入姓名，最多 80 人。</p></div></div><form id="importForm"><textarea name="students" rows="6" placeholder="01 王小明&#10;02 陳小華&#10;03 林小美" required></textarea><div class="button-row"><button class="primary">加入名單</button><button type="button" id="printQrBtn" class="ghost">列印全班 QR Code</button></div></form></section>
<section><div class="section-title"><h2>學生清單 <span id="studentCount" class="muted"></span></h2></div><div class="table-wrap"><table><thead><tr><th>座號</th><th>姓名</th><th>狀態</th><th>裝置</th><th>操作</th></tr></thead><tbody id="studentTable"></tbody></table></div><div id="emptyStudents" class="empty">尚未加入學生。</div></section></section></main>
<dialog id="qrDialog"><div class="dialog-head"><h2 id="qrTitle">學生 QR Code</h2><button class="icon-btn" data-close aria-label="關閉">×</button></div><canvas id="qrCanvas"></canvas><p id="qrHint" class="muted" hidden></p><p id="qrUrl" class="break-all"></p><div class="dialog-actions"><button id="copyQrUrlBtn" class="primary">複製網址</button></div></dialog>
<div id="toast" class="toast" role="status"></div><script type="module" src="./src/pages/teacher.js"></script></body></html>
