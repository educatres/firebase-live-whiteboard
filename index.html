<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#173f5f"><title>ClassPad 即時同步手寫白板</title><link rel="icon" href="./favicon.svg"><link rel="stylesheet" href="./src/styles/app.css"></head><body>
<header class="site-header"><a class="brand" href="./">ClassPad</a><span id="connectionBadge" class="badge">連線中</span></header>
<main class="container"><section class="hero"><div><p class="eyebrow">不用帳號・開課即用</p><h1>即時同步手寫白板</h1><p>適合 iPad 與 Apple Pencil 的課堂白板。建立專屬學生連結，即時監看並分層批注。</p><button id="createClassBtn" class="primary">建立新課堂</button></div><div class="hero-art" aria-hidden="true">✎</div></section>
<section class="notice"><strong>老師跨裝置登入：</strong>驗證資訊會保存在目前瀏覽器的本機儲存空間。建立課堂後也會顯示永久老師連結與未遮蔽的六位數密鑰，其他裝置可用它取得相同管理權限。</section>
<section><div class="section-title"><h2>我的課堂</h2><button id="refreshBtn" class="ghost">重新整理</button></div><div id="classList" class="card-grid"><p class="muted">正在讀取課堂…</p></div></section>
<section class="privacy-note"><h2>隱私提醒</h2><p>請避免輸入學生身分證字號、電話、Email、住址、醫療資料或其他敏感個人資料。建議只使用座號或暱稱。</p><a href="./privacy.html">查看隱私說明</a></section></main>
<dialog id="createDialog"><form id="createClassForm" method="dialog"><div class="dialog-head"><h2>建立課堂</h2><button type="button" class="icon-btn" data-close aria-label="關閉">×</button></div><p class="notice">課程建立 48 小時後會由老師端自動清除，請在到期前下載需要保留的作品。</p><label>課堂名稱<input name="title" maxlength="100" required placeholder="例如：六年甲班數學"></label><label>班級名稱<input name="className" maxlength="100" placeholder="例如：六年甲班"></label><label>活動名稱<input name="activityName" maxlength="100" placeholder="例如：分數練習"></label><div class="dialog-actions"><button type="button" class="ghost" data-close>取消</button><button class="primary" value="default">建立</button></div></form></dialog>
<div id="toast" class="toast" role="status"></div><script type="module" src="./src/pages/home.js"></script></body></html>
