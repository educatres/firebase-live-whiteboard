<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>隱私說明｜ClassPad</title><link rel="stylesheet" href="./src/styles/app.css"></head><body><header class="site-header"><a class="brand" href="./">ClassPad</a></header><main class="container prose"><h1>隱私說明</h1><p>本服務只保存課堂必要的座號或姓名、匿名資料庫使用者識別碼（UID）、學生筆跡、老師批注、在線狀態與最後活動時間。</p><h2>不蒐集的資料</h2><p>不蒐集 Email、電話、真實帳號、裝置指紋、精確位置、廣告識別碼或第三方分析資料。</p><h2>使用建議</h2><p>請只使用座號或暱稱，不要輸入身分證字號、電話、Email、住址、醫療資料等敏感資訊。課堂結束後，老師可先下載作品，再刪除整個課堂。</p></main></body></html>
