<!doctype html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"><title>學生白板｜ClassPad</title><link rel="stylesheet" href="./src/styles/app.css"></head><body class="board-page">
<header class="board-header"><div><strong id="studentName">正在開啟白板…</strong><span id="seatNumber" class="muted"></span></div><nav class="board-page-controls" aria-label="白板翻頁"><button id="studentPrevPage" class="ghost" type="button">上一頁</button><strong id="studentPageLabel">第 1 / 1 頁</strong><button id="studentNextPage" class="ghost" type="button">下一頁</button></nav><div class="status-row"><span id="lockBadge" class="badge" hidden>已鎖定</span><span id="connectionBadge" class="badge">連線中</span><span id="syncBadge" class="badge">準備中</span></div></header>
<main id="boardShell" class="board-shell"><div id="boardMessage" class="board-message">正在驗證專屬連結…</div><div id="boardStage" class="board-stage" hidden><canvas id="backgroundCanvas"></canvas><div id="studentBackgroundLayer" class="background-image-layer"><img id="studentBackgroundImage" class="board-background-image" alt="老師分享的題目底圖" hidden></div><canvas id="studentCanvas"></canvas><canvas id="teacherCanvas" class="readonly-layer"></canvas><div id="studentStickyLayer" class="sticky-layer" aria-label="老師便條貼"></div></div></main>
<div id="studentToolbar" class="board-toolbar" hidden><button data-tool="pen" class="active" aria-label="畫筆">✎<span>畫筆</span></button><button data-tool="eraser" aria-label="橡皮擦">⌫<span>橡皮擦</span></button><label class="color-tool">顏色<input id="colorInput" type="color" value="#173f5f" aria-label="畫筆顏色"></label><label>粗細<input id="widthInput" type="range" min="1" max="40" value="5" aria-label="畫筆粗細"></label><button id="undoBtn" aria-label="復原">復原</button><button id="redoBtn" aria-label="重做">重做</button><button id="resetZoomBtn" aria-label="重設縮放">100%</button></div>
<div id="toast" class="toast" role="status"></div><script type="module" src="./src/pages/student.js"></script></body></html>
